        limit: 20
        total: 1
        totalPages: 1

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: 로그인 이메일
        password:
          type: string
          format: password
          minLength: 8
          description: 비밀번호
      example:
        email: user@example.com
        password: Password123!

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: 갱신 토큰
      example:
        refreshToken: refresh-token-value

    TokenPair:
      type: object
      required:
        - tokenType
        - accessToken
        - refreshToken
        - expiresIn
      properties:
        tokenType:
          type: string
          enum: [Bearer]
          description: 토큰 타입
        accessToken:
          type: string
          description: JWT access token
        refreshToken:
          type: string
          description: JWT refresh token
        expiresIn:
          type: integer
          minimum: 1
          description: access token 만료 시간(초)
      example:
        tokenType: Bearer
        accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.access
        refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.refresh
        expiresIn: 3600

    ActionResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          description: 성공 여부
        message:
          type: string
          description: 결과 메시지
      example:
        success: true
        message: 처리되었습니다.

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 에러 코드
          enum:
            - INVALID_REQUEST
            - UNAUTHORIZED
            - FORBIDDEN
            - NOT_FOUND
            - CONFLICT
            - INTERNAL_ERROR
        message:
          type: string
          description: 에러 메시지
        details:
          type: array
          description: 필드별 상세 오류
          items:
            $ref: '#/components/schemas/ErrorDetail'
      example:
        code: INVALID_REQUEST
        message: 요청 값이 올바르지 않습니다.
        details:
          - field: title
            message: 제목은 비어 있을 수 없습니다.

    ErrorDetail:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          description: 오류가 발생한 필드
        message:
          type: string
          description: 오류 메시지

